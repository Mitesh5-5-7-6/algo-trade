# CI gate (plan/22 §2): lint → typecheck → test → build on every push.
# Red blocks the merge — code that hasn't passed has no route to a broker.
# CI holds no production secrets and no route to production data (plan/24 §2).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Real Redis + Mongo for integration tests (plan/27 §2, arriving with
    # the redis/db packages). Unit tests ignore them.
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      REDIS_URL: redis://localhost:6379
      MONGO_URI: mongodb://localhost:27017/neelkanth_ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install (frozen lockfile — plan/24 §6)
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Dependency audit (plan/24 §6)
        run: pnpm audit --prod --audit-level high
