# Local development infrastructure (plan/22 §2 stack, dev slice).
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # AOF on, matching the plan/08 §10 durability posture for jobs:/session:
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data:
